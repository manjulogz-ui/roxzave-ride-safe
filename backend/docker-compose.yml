services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: roxzave
      POSTGRES_PASSWORD: roxzave_secret
      POSTGRES_DB: roxzave
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roxzave"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://roxzave:roxzave_secret@postgres:5432/roxzave
      DATABASE_URL_SYNC: postgresql://roxzave:roxzave_secret@postgres:5432/roxzave
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-me-in-production-use-openssl-rand
      JWT_REFRESH_SECRET_KEY: change-me-refresh-in-production
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,capacitor://localhost,http://localhost
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
